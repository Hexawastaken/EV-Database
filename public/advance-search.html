<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Search — EV Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #faf1ea;
        --surface: #ffffff;
        --line: #e5dbd4;
        --text: #16181c;
        --muted: #767a7f;
        --accent: #f57400;
        --accent-soft: #fef3e6;
        --gauge-track: #eceef4;
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ---- NAVBAR ---- */
      nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 14px 32px;
        background: var(--accent-soft);
        border-bottom: 2px solid var(--accent);
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .nav-left {
        grid-column: 1;
        justify-self: start;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-brand {
        grid-column: 2;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-self: center;
      }
      .logo-slot {
        width: 43px;
        height: 43px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-slot img {
        width: 200%;
        height: 200%;
        object-fit: contain;
      }
      .logo-fallback {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--text);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.02em;
      }
      .nav-brand h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: 18px;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .nav-right {
        grid-column: 3;
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 9px 18px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.15s;
      }
      .nav-btn:hover {
        background: #d96a00;
      }
      .nav-btn-outline {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
        padding: 9px 18px;
        border-radius: 7px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .nav-btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }
      .nav-btn-logout {
        background: #b13e4b;
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 9px 18px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.15s;
        display: none;
      }
      .nav-btn-logout:hover {
        background: #9a3340;
      }

      /* ---- Modal Overlay ---- */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: var(--surface);
        border-radius: 20px;
        padding: 2.5rem 2.8rem;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        animation: modalFade 0.25s ease;
      }
      @keyframes modalFade {
        0% {
          opacity: 0;
          transform: scale(0.96) translateY(12px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-box h2 {
        font-family: var(--display);
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 6px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .modal-box .sub {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 1.5rem;
        border-left: 3px solid var(--accent);
        padding-left: 12px;
      }
      .modal-box .input-group {
        margin-bottom: 1rem;
      }
      .modal-box .input-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .modal-box .input-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        background: var(--bg);
        transition: border-color 0.15s;
      }
      .modal-box .input-group input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(245, 116, 0, 0.2);
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 1.2rem;
        flex-wrap: wrap;
      }
      .modal-actions .btn {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.15s;
        font-size: 14px;
      }
      .modal-actions .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .modal-actions .btn-primary:hover {
        background: #d96a00;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(245, 116, 0, 0.3);
      }
      .modal-actions .btn-secondary {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .modal-actions .btn-secondary:hover {
        background: var(--line);
      }
      .modal-message {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .modal-message.error {
        display: block;
        background: #fde8ea;
        color: #b13e4b;
        border: 1px solid #f5c8cc;
      }
      .modal-message.success {
        display: block;
        background: #e6f4ef;
        color: #1a6e5c;
        border: 1px solid #b8dfd2;
      }

      /* ---- SHELL ---- */
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 32px 60px;
      }

      /* ---- FILTER SECTION ---- */
      .filter-section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px 28px;
        margin-bottom: 28px;
      }
      .filter-section h2 {
        font-family: var(--display);
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 20px 0;
        letter-spacing: -0.01em;
      }

      /* FILTER ROW (grid) */
      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px 20px;
        align-items: end;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .filter-group label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .filter-group select,
      .filter-group input {
        font-family: var(--body);
        font-size: 13px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      .filter-group select:focus,
      .filter-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(245, 116, 0, 0.2);
      }

      .filter-group .range-inputs {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .filter-group .range-inputs input {
        width: 100%;
        min-width: 0;
      }
      .filter-group .range-inputs span {
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* FILTER ACTIONS */
      .filter-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
        align-items: center;
        border-top: 1px solid var(--line);
        padding-top: 18px;
      }
      .btn {
        padding: 9px 22px;
        border: none;
        border-radius: 7px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: #d96a00;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(245, 116, 0, 0.3);
      }
      .btn-secondary {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .btn-secondary:hover {
        background: var(--line);
      }

      /* ---- RESULTS ---- */
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .result-header h3 {
        font-family: var(--display);
        font-size: 20px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .result-count {
        font-size: 13px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .filter-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }
      }
      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 12px 16px;
        }
        .shell {
          padding: 16px 16px 40px;
        }
        .filter-section {
          padding: 16px;
        }
        .filter-grid {
          grid-template-columns: 1fr 1fr;
        }
        .filter-group.span-full {
          grid-column: 1 / -1;
        }
      }

      /* ---- CARD ---- */
      .card {
        display: block;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        transition:
          box-shadow 0.15s ease,
          transform 0.15s ease;
        color: inherit;
      }
      .card:hover {
        box-shadow: 0 10px 28px rgba(245, 116, 0, 0.12);
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .card-thumb {
        aspect-ratio: 16/10;
        background: linear-gradient(180deg, #f1f2f6, #e9eaf0);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .card-thumb .placeholder-svg {
        width: 58%;
        color: #b7bcc8;
      }
      .card-body {
        padding: 14px 15px 16px;
      }
      .card-eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }
      .card-title {
        font-family: var(--display);
        font-size: 16.5px;
        font-weight: 600;
        margin: 3px 0 10px;
        letter-spacing: -0.01em;
      }
      .gauge {
        margin-bottom: 10px;
      }
      .gauge-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .gauge-track {
        height: 5px;
        background: var(--gauge-track);
        border-radius: 3px;
        overflow: hidden;
      }
      .gauge-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
      }
      .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 8px;
      }
      .card-price {
        font-family: var(--display);
        font-weight: 700;
        font-size: 15px;
      }
      .card-year {
        font-size: 11.5px;
        color: var(--muted);
      }
      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-left" id="navLeft"></div>

      <div class="nav-brand">
        <a href="index.html" class="logo-slot">
          <img
            src="./Pictures/Saipa-logo.png"
            alt="Saipa"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <div class="logo-fallback" style="display: none">SAIPA</div>
        </a>
        <h1>EV Database</h1>
      </div>
      <div class="nav-right">
        <a href="index.html" class="nav-btn-outline">← Home</a>
        <a href="search.html" class="nav-btn-outline">🔍 Search</a>
        <button class="nav-btn" id="loginBtn">Log in</button>
        <button class="nav-btn-logout" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <div class="shell">
      <!-- FILTERS -->
      <section class="filter-section">
        <h2>🔎 Advanced Search</h2>

        <div class="filter-grid">
          <!-- Powertrain -->
          <div class="filter-group">
            <label for="powertrainSelect">Powertrain</label>
            <select id="powertrainSelect">
              <option value="">All</option>
            </select>
          </div>

          <!-- Manufacturer -->
          <div class="filter-group">
            <label for="manufacturerSelect">Manufacturer</label>
            <select id="manufacturerSelect">
              <option value="">All</option>
            </select>
          </div>

          <!-- Region -->
          <div class="filter-group">
            <label for="regionSelect">Region</label>
            <select id="regionSelect">
              <option value="">All</option>
            </select>
          </div>

          <!-- Year Range (replaced dropdown) -->
          <div class="filter-group">
            <label>Release Year</label>
            <div class="range-inputs">
              <input
                type="number"
                id="yearMin"
                placeholder="Min"
                min="2000"
                max="2030"
                step="1"
              />
              <span>–</span>
              <input
                type="number"
                id="yearMax"
                placeholder="Max"
                min="2000"
                max="2030"
                step="1"
              />
            </div>
          </div>

          <!-- Body Type (class) -->
          <div class="filter-group">
            <label for="classSelect">Body Type</label>
            <select id="classSelect">
              <option value="">All</option>
            </select>
          </div>

          <!-- Drive Type -->
          <div class="filter-group">
            <label for="driveSelect">Drive Type</label>
            <select id="driveSelect">
              <option value="">All</option>
            </select>
          </div>

          <!-- Price Range (min / max) -->
          <div class="filter-group">
            <label>Price ($)</label>
            <div class="range-inputs">
              <input
                type="number"
                id="priceMin"
                placeholder="Min"
                min="0"
                step="100"
              />
              <span>–</span>
              <input
                type="number"
                id="priceMax"
                placeholder="Max"
                min="0"
                step="100"
              />
            </div>
          </div>

          <!-- Battery Capacity (min / max) -->
          <div class="filter-group">
            <label>Battery (kWh)</label>
            <div class="range-inputs">
              <input
                type="number"
                id="batteryMin"
                placeholder="Min"
                min="0"
                step="0.5"
              />
              <span>–</span>
              <input
                type="number"
                id="batteryMax"
                placeholder="Max"
                min="0"
                step="0.5"
              />
            </div>
          </div>
        </div>

        <div class="filter-actions">
          <button class="btn btn-primary" id="searchBtn">Apply Filters</button>
          <button class="btn btn-secondary" id="clearBtn">Clear All</button>
        </div>
      </section>

      <!-- RESULTS -->
      <div class="result-header">
        <h3>Results</h3>
        <span class="result-count" id="resultCount">0 models</span>
      </div>
      <div class="grid" id="grid">
        <div class="empty-state">Loading models…</div>
      </div>
    </div>

    <!-- ===== LOGIN MODAL ===== -->
    <div class="modal-overlay" id="loginModal">
      <div class="modal-box">
        <h2>🔐 Log in</h2>
        <div class="sub">Enter your credentials</div>
        <div class="input-group">
          <label for="modalUsername">Username</label>
          <input type="text" id="modalUsername" placeholder="admin" />
        </div>
        <div class="input-group">
          <label for="modalPassword">Password</label>
          <input type="password" id="modalPassword" placeholder="••••••••" />
        </div>
        <div id="modalMessage" class="modal-message"></div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="modalLoginBtn">Log in</button>
          <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var API_BASE = "../api/";
        var allModels = [];
        var allManufacturers = [];
        var allPowertrains = [];
        var allClasses = [];
        var allDrives = [];
        var manMap = {};
        var manMapCountry = {};
        var classMap = {};
        var driveMap = {};

        // ---- DOM refs for login modal ----
        var loginModal = document.getElementById("loginModal");
        var modalUsername = document.getElementById("modalUsername");
        var modalPassword = document.getElementById("modalPassword");
        var modalLoginBtn = document.getElementById("modalLoginBtn");
        var modalCancelBtn = document.getElementById("modalCancelBtn");
        var modalMessage = document.getElementById("modalMessage");
        var loginBtn = document.getElementById("loginBtn");
        var logoutBtn = document.getElementById("logoutBtn");
        var navLeft = document.getElementById("navLeft");

        // ---- Login / Logout functions ----
        function showLoginModal() {
          modalUsername.value = "";
          modalPassword.value = "";
          modalMessage.className = "modal-message";
          modalMessage.textContent = "";
          loginModal.classList.add("active");
          modalUsername.focus();
        }

        function hideLoginModal() {
          loginModal.classList.remove("active");
        }

        function attemptLogin() {
          var username = modalUsername.value.trim();
          var password = modalPassword.value.trim();
          if (!username || !password) {
            modalMessage.className = "modal-message error";
            modalMessage.textContent = "Please fill in both fields.";
            return;
          }

          fetch(API_BASE + "login.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password }),
            credentials: "include",
          })
            .then((r) => r.json())
            .then((data) => {
              if (data.status) {
                modalMessage.className = "modal-message success";
                modalMessage.textContent = "✅ Login successful!";
                setTimeout(function () {
                  hideLoginModal();
                  updateUI();
                }, 800);
              } else {
                modalMessage.className = "modal-message error";
                modalMessage.textContent = "❌ " + data.message;
              }
            })
            .catch(function (err) {
              modalMessage.className = "modal-message error";
              modalMessage.textContent = "⚠️ Server error. Please try again.";
              console.error(err);
            });
        }

        function logout() {
          fetch(API_BASE + "logout.php", { credentials: "include" })
            .then((r) => r.json())
            .then(function () {
              updateUI();
            });
        }

        function updateUI() {
          fetch(API_BASE + "check-session.php", { credentials: "include" })
            .then((r) => r.json())
            .then((data) => {
              if (data.loggedIn) {
                loginBtn.style.display = "none";
                logoutBtn.style.display = "inline-block";
                navLeft.innerHTML =
                  '<a href="admin.html" class="nav-btn-outline">⚙️ Admin Dashboard</a>';
              } else {
                loginBtn.style.display = "inline-block";
                logoutBtn.style.display = "none";
                navLeft.innerHTML = "";
              }
            })
            .catch(function () {
              loginBtn.style.display = "inline-block";
              logoutBtn.style.display = "none";
              navLeft.innerHTML = "";
            });
        }

        // ---- Event listeners for login modal ----
        loginBtn.addEventListener("click", showLoginModal);
        logoutBtn.addEventListener("click", logout);
        modalCancelBtn.addEventListener("click", hideLoginModal);
        modalLoginBtn.addEventListener("click", attemptLogin);

        loginModal.addEventListener("click", function (e) {
          if (e.target === loginModal) hideLoginModal();
        });

        modalUsername.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            modalPassword.focus();
          }
        });
        modalPassword.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            attemptLogin();
          }
        });

        // ---- SVG placeholder ----
        var CAR_SVG =
          '<svg class="placeholder-svg" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M6 26 L10 15 Q12 11 18 11 H40 Q46 11 49 15 L54 24" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>' +
          '<path d="M4 26 H58 Q60 26 60 28 V30 Q60 32 58 32 H4 Q2 32 2 30 V28 Q2 26 4 26 Z" fill="currentColor" opacity="0.15"/>' +
          '<path d="M4 26 H58" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' +
          '<circle cx="16" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<circle cx="46" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<path d="M20 12 V20 M34 12 V20" stroke="currentColor" stroke-width="1.6" opacity="0.5"/>' +
          "</svg>";

        function escapeHtml(str) {
          if (str === null || str === undefined) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        // ---- fetch data (with credentials) ----
        function fetchJson(url) {
          return fetch(url, { credentials: "include" }).then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          });
        }

        function loadData() {
          return Promise.all([
            fetchJson(API_BASE + "read-all-model.php")
              .then(function (json) {
                return json.data || json.posts || [];
              })
              .catch(function () {
                return [];
              }),
            fetchJson(API_BASE + "read-all-man.php")
              .then(function (json) {
                return json.data || json.posts || [];
              })
              .catch(function () {
                return [];
              }),
            fetchJson(API_BASE + "read-all-powertrain.php")
              .then(function (json) {
                return json.data || json.posts || [];
              })
              .catch(function () {
                return [];
              }),
            fetchJson(API_BASE + "read-all-class.php")
              .then(function (json) {
                return json.data || json.posts || [];
              })
              .catch(function () {
                return [];
              }),
            fetchJson(API_BASE + "read-all-drive.php")
              .then(function (json) {
                return json.data || json.posts || [];
              })
              .catch(function () {
                return [];
              }),
          ])
            .then(function (results) {
              allModels = results[0] || [];
              allManufacturers = results[1] || [];
              allPowertrains = results[2] || [];
              allClasses = results[3] || [];
              allDrives = results[4] || [];

              // Build maps
              manMap = {};
              manMapCountry = {};
              allManufacturers.forEach(function (m) {
                manMap[m.id] = m.name;
                manMapCountry[m.id] = m.country || "";
              });
              classMap = {};
              allClasses.forEach(function (c) {
                classMap[c.id] = c.name;
              });
              driveMap = {};
              allDrives.forEach(function (d) {
                driveMap[d.id] = d.name;
              });

              populateFilters();
              applyFilters();
            })
            .catch(function (err) {
              document.getElementById("grid").innerHTML =
                '<div class="empty-state">Could not load data. Check API.</div>';
              console.error(err);
            });
        }

        // ---- populate filters ----
        function populateFilters() {
          // Powertrain
          var ptSelect = document.getElementById("powertrainSelect");
          var ptHtml = '<option value="">All</option>';
          allPowertrains.forEach(function (p) {
            ptHtml +=
              '<option value="' +
              p.id +
              '">' +
              escapeHtml(p.name) +
              "</option>";
          });
          ptSelect.innerHTML = ptHtml;

          // Manufacturer
          var manSelect = document.getElementById("manufacturerSelect");
          var manHtml = '<option value="">All</option>';
          allManufacturers.forEach(function (m) {
            manHtml +=
              '<option value="' +
              m.id +
              '">' +
              escapeHtml(m.name) +
              "</option>";
          });
          manSelect.innerHTML = manHtml;

          // Region
          var regions = {};
          allManufacturers.forEach(function (m) {
            if (m.country) regions[m.country] = true;
          });
          var regionSelect = document.getElementById("regionSelect");
          var regHtml = '<option value="">All</option>';
          Object.keys(regions)
            .sort()
            .forEach(function (country) {
              regHtml +=
                '<option value="' +
                escapeHtml(country) +
                '">' +
                escapeHtml(country) +
                "</option>";
            });
          regionSelect.innerHTML = regHtml;

          // No need to populate year dropdown; it's now a range input

          // Body Type (class)
          var classSelect = document.getElementById("classSelect");
          var classHtml = '<option value="">All</option>';
          allClasses.forEach(function (c) {
            classHtml +=
              '<option value="' +
              c.id +
              '">' +
              escapeHtml(c.name) +
              "</option>";
          });
          classSelect.innerHTML = classHtml;

          // Drive Type
          var driveSelect = document.getElementById("driveSelect");
          var driveHtml = '<option value="">All</option>';
          allDrives.forEach(function (d) {
            driveHtml +=
              '<option value="' +
              d.id +
              '">' +
              escapeHtml(d.name) +
              "</option>";
          });
          driveSelect.innerHTML = driveHtml;
        }

        // ---- apply filters ----
        function applyFilters() {
          var powertrainId = document.getElementById("powertrainSelect").value;
          var manufacturerId =
            document.getElementById("manufacturerSelect").value;
          var region = document.getElementById("regionSelect").value;
          var yearMin = parseInt(document.getElementById("yearMin").value);
          var yearMax = parseInt(document.getElementById("yearMax").value);
          var classId = document.getElementById("classSelect").value;
          var driveId = document.getElementById("driveSelect").value;
          var priceMin = parseFloat(document.getElementById("priceMin").value);
          var priceMax = parseFloat(document.getElementById("priceMax").value);
          var batteryMin = parseFloat(
            document.getElementById("batteryMin").value,
          );
          var batteryMax = parseFloat(
            document.getElementById("batteryMax").value,
          );

          var filtered = allModels.filter(function (m) {
            // Powertrain
            if (
              powertrainId &&
              String(m.powertrain_id) !== String(powertrainId)
            )
              return false;
            // Manufacturer
            if (
              manufacturerId &&
              String(m.manufacturer_id) !== String(manufacturerId)
            )
              return false;
            // Region (via manufacturer country)
            if (region) {
              var manCountry = manMapCountry[m.manufacturer_id] || "";
              if (manCountry !== region) return false;
            }
            // Year range
            if (!isNaN(yearMin) && m.release_year < yearMin) return false;
            if (!isNaN(yearMax) && m.release_year > yearMax) return false;
            // Body type (class)
            if (classId && String(m.class_id) !== String(classId)) return false;
            // Drive type
            if (driveId && String(m.drive_type_id) !== String(driveId))
              return false;

            // Price range
            var price = Number(m.price);
            if (!isNaN(priceMin) && price < priceMin) return false;
            if (!isNaN(priceMax) && price > priceMax) return false;

            // Battery capacity range
            var battery = Number(m.battery_capacity);
            if (!isNaN(batteryMin) && battery < batteryMin) return false;
            if (!isNaN(batteryMax) && battery > batteryMax) return false;

            return true;
          });

          renderGrid(filtered);
        }

        // ---- render grid ----
        function renderGrid(list) {
          var grid = document.getElementById("grid");
          var countEl = document.getElementById("resultCount");
          countEl.textContent =
            list.length + (list.length === 1 ? " model" : " models");

          if (!list.length) {
            grid.innerHTML =
              '<div class="empty-state">No models match those filters.</div>';
            return;
          }

          var maxRange =
            Math.max.apply(
              null,
              allModels.map(function (m) {
                return Number(m.cltc_range) || 0;
              }),
            ) || 1;

          var gridHtml = "";
          list.forEach(function (m) {
            var pct = Math.max(
              4,
              Math.round(((Number(m.cltc_range) || 0) / maxRange) * 100),
            );
            var price = Number(m.price);
            var priceText = isNaN(price) ? "—" : "$" + price.toLocaleString();

            var cardHtml =
              '<a class="card" href="model.html?id=' +
              encodeURIComponent(m.id) +
              '">' +
              '<div class="card-thumb">';

            if (
              m.img_url &&
              m.img_url.trim() &&
              m.img_url !== "NULL" &&
              m.img_url !== "null"
            ) {
              cardHtml +=
                '<img src="' +
                escapeHtml(m.img_url) +
                '" alt="' +
                escapeHtml(m.model_name) +
                '" loading="lazy" onerror="this.outerHTML = \'' +
                CAR_SVG.replace(/'/g, "\\'").replace(/"/g, "&quot;") +
                "';\">";
            } else {
              cardHtml += CAR_SVG;
            }

            cardHtml +=
              "</div>" +
              '<div class="card-body">' +
              '<div class="card-eyebrow">' +
              escapeHtml(manMap[m.manufacturer_id] || "Unknown brand") +
              "</div>" +
              '<div class="card-title">' +
              escapeHtml(m.model_name) +
              "</div>" +
              '<div class="gauge">' +
              '<div class="gauge-labels"><span>Range</span><span>' +
              escapeHtml(m.cltc_range) +
              " km</span></div>" +
              '<div class="gauge-track"><div class="gauge-fill" style="width:' +
              pct +
              '%"></div></div>' +
              "</div>" +
              '<div class="card-foot">' +
              '<span class="card-price">' +
              priceText +
              "</span>" +
              '<span class="card-year">' +
              escapeHtml(m.release_year) +
              "</span>" +
              "</div>" +
              "</div>" +
              "</a>";

            gridHtml += cardHtml;
          });

          grid.innerHTML = gridHtml;
        }

        // ---- event listeners ----
        document
          .getElementById("searchBtn")
          .addEventListener("click", applyFilters);
        document
          .getElementById("clearBtn")
          .addEventListener("click", function () {
            document.getElementById("powertrainSelect").value = "";
            document.getElementById("manufacturerSelect").value = "";
            document.getElementById("regionSelect").value = "";
            document.getElementById("yearMin").value = "";
            document.getElementById("yearMax").value = "";
            document.getElementById("classSelect").value = "";
            document.getElementById("driveSelect").value = "";
            document.getElementById("priceMin").value = "";
            document.getElementById("priceMax").value = "";
            document.getElementById("batteryMin").value = "";
            document.getElementById("batteryMax").value = "";
            applyFilters();
          });

        // Auto-apply on change (dropdown only)
        document
          .getElementById("powertrainSelect")
          .addEventListener("change", applyFilters);
        document
          .getElementById("manufacturerSelect")
          .addEventListener("change", applyFilters);
        document
          .getElementById("regionSelect")
          .addEventListener("change", applyFilters);
        // Year range inputs trigger on input (or change) – we'll add input listeners
        document
          .getElementById("yearMin")
          .addEventListener("input", applyFilters);
        document
          .getElementById("yearMax")
          .addEventListener("input", applyFilters);
        document
          .getElementById("classSelect")
          .addEventListener("change", applyFilters);
        document
          .getElementById("driveSelect")
          .addEventListener("change", applyFilters);

        // ---- init ----
        loadData();
        updateUI(); // set initial login state
      })();
    </script>
  </body>
</html>
