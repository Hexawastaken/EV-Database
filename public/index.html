<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f6f3;
        --surface: #ffffff;
        --line: #e6e5e0;
        --text: #16181c;
        --muted: #767a7f;
        --accent: #2547f4;
        --accent-soft: #eaedfe;
        --gauge-track: #eceef4;
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ---- NAVBAR ---- */
      nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 14px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .nav-brand {
        grid-column: 2;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-self: center;
      }
      .logo-slot {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-slot img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .logo-fallback {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--text);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.02em;
      }
      .nav-brand h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: 18px;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .nav-right {
        grid-column: 3;
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
      }
      .login-btn {
        background: var(--text);
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 9px 18px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .login-btn:hover {
        background: #000;
      }
      .settings-btn {
        background: none;
        border: 1px solid var(--line);
        color: var(--muted);
        border-radius: 7px;
        width: 34px;
        height: 34px;
        cursor: pointer;
        font-size: 14px;
      }
      .settings-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .settings-pop {
        position: absolute;
        right: 0;
        top: 44px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        display: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        z-index: 30;
      }
      .settings-pop.show {
        display: block;
      }
      .settings-pop label {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-bottom: 5px;
      }
      .settings-pop input {
        font-family: var(--body);
        font-size: 12px;
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        width: 180px;
        margin-bottom: 8px;
      }
      .settings-pop button {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 7px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      /* ---- SEARCH STRIP ---- */
      .search-strip {
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        padding: 16px 32px;
      }
      .search-box {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px 16px;
      }
      .search-box svg {
        flex-shrink: 0;
        opacity: 0.5;
      }
      .search-box input {
        border: none;
        outline: none;
        font-family: var(--body);
        font-size: 14px;
        width: 100%;
        background: none;
        color: var(--text);
      }

      /* ---- LAYOUT ---- */
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 32px 60px;
        display: flex;
        gap: 28px;
      }

      /* sidebar */
      .sidebar {
        width: 230px;
        flex-shrink: 0;
      }
      .sidebar-search {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      .sidebar-search svg {
        opacity: 0.45;
        flex-shrink: 0;
      }
      .sidebar-search input {
        border: none;
        outline: none;
        font-size: 13px;
        width: 100%;
        font-family: var(--body);
        background: none;
      }
      .man-list {
        max-height: 560px;
        overflow-y: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
      }
      .man-item {
        padding: 10px 14px;
        font-size: 13.5px;
        cursor: pointer;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text);
      }
      .man-item:last-child {
        border-bottom: none;
      }
      .man-item:hover {
        background: var(--accent-soft);
      }
      .man-item.active {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      .man-item .count {
        font-size: 11px;
        color: var(--muted);
      }
      .man-item.active .count {
        color: rgba(255, 255, 255, 0.75);
      }

      /* main */
      .main {
        flex: 1;
        min-width: 0;
      }
      .page-title {
        font-family: var(--display);
        font-size: 30px;
        font-weight: 700;
        margin: 4px 0 16px;
        letter-spacing: -0.01em;
      }

      .filter-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 14px;
        margin-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filters select {
        font-family: var(--body);
        font-size: 12.5px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }
      .result-count {
        font-size: 12.5px;
        color: var(--muted);
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .shell {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
      }
      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 12px 16px;
        }
        .shell {
          padding: 16px 16px 40px;
        }
      }

      .card {
        display: block;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        transition:
          box-shadow 0.15s ease,
          transform 0.15s ease;
        color: inherit;
      }
      .card:hover {
        box-shadow: 0 10px 28px rgba(20, 20, 20, 0.08);
        transform: translateY(-2px);
      }
      .card-thumb {
        aspect-ratio: 16/10;
        background: linear-gradient(180deg, #f1f2f6, #e9eaf0);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .card-thumb .placeholder-svg {
        width: 58%;
        color: #b7bcc8;
      }
      .card-body {
        padding: 14px 15px 16px;
      }
      .card-eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }
      .card-title {
        font-family: var(--display);
        font-size: 16.5px;
        font-weight: 600;
        margin: 3px 0 10px;
        letter-spacing: -0.01em;
      }

      .gauge {
        margin-bottom: 10px;
      }
      .gauge-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .gauge-track {
        height: 5px;
        background: var(--gauge-track);
        border-radius: 3px;
        overflow: hidden;
      }
      .gauge-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
      }

      .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 8px;
      }
      .card-price {
        font-family: var(--display);
        font-weight: 700;
        font-size: 15px;
      }
      .card-year {
        font-size: 11.5px;
        color: var(--muted);
      }

      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-brand">
        <div class="logo-slot">
          <img
            src="./Pictures/Saipa-logo-BF808B7974-seeklogo.com.png"
            alt="Saipa"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <div class="logo-fallback" style="display: none">SAIPA</div>
        </div>
        <h1>EV Database</h1>
      </div>
      <div class="nav-right">
        <button class="settings-btn" id="settingsBtn" title="API settings">
          ⚙
        </button>
        <!-- Login button placeholder — drop in your login code in for #loginBtn. -->
        <button class="login-btn" id="loginBtn">Log in</button>
        <div class="settings-pop" id="settingsPop">
          <label>API base path</label>
          <input id="apiBase" type="text" value="../api" />
          <button id="saveApiBase">Save</button>
        </div>
      </div>
    </nav>

    <div class="search-strip">
      <div class="search-box">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          id="globalSearch"
          type="text"
          placeholder="Search brand or model"
        />
      </div>
    </div>

    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-search">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="brandFilter" type="text" placeholder="Type brand..." />
        </div>
        <div class="man-list" id="manList">
          <div class="man-item active" data-id="">All Brands</div>
        </div>
      </aside>

      <main class="main">
        <h2 class="page-title">All models</h2>

        <div class="filter-bar">
          <div class="filters">
            <select id="fPrice">
              <option value="">Price: Any</option>
              <option value="0-30000">Under $30k</option>
              <option value="30000-50000">$30k – $50k</option>
              <option value="50000-80000">$50k – $80k</option>
              <option value="80000-999999999">Over $80k</option>
            </select>
            <select id="fBattery">
              <option value="">Battery: Any</option>
              <option value="0-60">Under 60 kWh</option>
              <option value="60-90">60 – 90 kWh</option>
              <option value="90-9999">90 kWh+</option>
            </select>
            <select id="fPower">
              <option value="">Motor power: Any</option>
              <option value="0-150">Under 150 kW</option>
              <option value="150-300">150 – 300 kW</option>
              <option value="300-99999">300 kW+</option>
            </select>
            <select id="fSort">
              <option value="newest">Sort: Newest</option>
              <option value="price-asc">Price: Low to high</option>
              <option value="price-desc">Price: High to low</option>
              <option value="range-desc">Longest range</option>
            </select>
          </div>
          <div class="result-count" id="resultCount"></div>
        </div>

        <div class="grid" id="grid">
          <div class="empty-state">Loading models…</div>
        </div>
      </main>
    </div>

    <script>
      (function () {
        var API_BASE = "../api/";
        var manufacturers = []; // {id, name}
        var manMap = {}; // id -> name
        var models = []; // raw model list
        var activeManufacturerId = "";

        // ---- settings popover ----
        var settingsBtn = document.getElementById("settingsBtn");
        var settingsPop = document.getElementById("settingsPop");
        var apiBaseInput = document.getElementById("apiBase");
        settingsBtn.addEventListener("click", function () {
          settingsPop.classList.toggle("show");
        });
        document
          .getElementById("saveApiBase")
          .addEventListener("click", function () {
            API_BASE = document.getElementById("apiBase").value.trim();
            if (API_BASE && !API_BASE.endsWith("/")) API_BASE += "/";
            settingsPop.classList.remove("show");
            loadAll();
          });

        // ---- login button placeholder ----
        document
          .getElementById("loginBtn")
          .addEventListener("click", function () {
            alert(
              "Admin login goes here — drop your login code in for #loginBtn.",
            );
          });

        // ---- vehicle placeholder SVG ----
        var CAR_SVG =
          '<svg class="placeholder-svg" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M6 26 L10 15 Q12 11 18 11 H40 Q46 11 49 15 L54 24" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>' +
          '<path d="M4 26 H58 Q60 26 60 28 V30 Q60 32 58 32 H4 Q2 32 2 30 V28 Q2 26 4 26 Z" fill="currentColor" opacity="0.15"/>' +
          '<path d="M4 26 H58" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' +
          '<circle cx="16" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<circle cx="46" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<path d="M20 12 V20 M34 12 V20" stroke="currentColor" stroke-width="1.6" opacity="0.5"/>' +
          "</svg>";

        function escapeHtml(str) {
          if (str === null || str === undefined) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        // ---- load data ----
        function loadAll() {
          document.getElementById("grid").innerHTML =
            '<div class="empty-state">Loading models…</div>';

          Promise.all([
            fetch(API_BASE + "read-all-man.php")
              .then(function (r) {
                return r.json();
              })
              .catch(function () {
                return { data: [] };
              }),
            fetch(API_BASE + "read-all-model.php")
              .then(function (r) {
                return r.json();
              })
              .catch(function () {
                return { data: [] };
              }),
          ])
            .then(function (results) {
              manufacturers = results[0].data || [];
              models = results[1].data || [];

              // Debug: Log the first model to check if img_url is present
              if (models.length > 0) {
                console.log("First model data:", models[0]);
                console.log("img_url:", models[0].img_url);
              }

              manMap = {};
              manufacturers.forEach(function (m) {
                manMap[m.id] = m.name;
              });
              renderSidebar();
              applyFilters();
            })
            .catch(function (error) {
              console.error("Error loading data:", error);
              document.getElementById("grid").innerHTML =
                '<div class="empty-state">Could not reach the API. Check the ⚙ API settings.</div>';
            });
        }

        // ---- sidebar ----
        function renderSidebar() {
          var counts = {};
          models.forEach(function (m) {
            counts[m.manufacturer_id] = (counts[m.manufacturer_id] || 0) + 1;
          });

          var html =
            '<div class="man-item' +
            (activeManufacturerId === "" ? " active" : "") +
            '" data-id="">All Brands <span class="count">' +
            models.length +
            "</span></div>";
          manufacturers.forEach(function (m) {
            html +=
              '<div class="man-item' +
              (String(activeManufacturerId) === String(m.id) ? " active" : "") +
              '" data-id="' +
              m.id +
              '">' +
              escapeHtml(m.name) +
              ' <span class="count">' +
              (counts[m.id] || 0) +
              "</span></div>";
          });
          var manList = document.getElementById("manList");
          manList.innerHTML = html;
          manList.querySelectorAll(".man-item").forEach(function (item) {
            item.addEventListener("click", function () {
              activeManufacturerId = item.dataset.id;
              renderSidebar();
              applyFilters();
            });
          });
        }

        document
          .getElementById("brandFilter")
          .addEventListener("input", function (e) {
            var q = e.target.value.toLowerCase();
            document.querySelectorAll(".man-item").forEach(function (item) {
              if (item.dataset.id === "") return;
              var name = item.textContent.toLowerCase();
              item.style.display = name.indexOf(q) === -1 ? "none" : "flex";
            });
          });

        // ---- filters ----
        ["fPrice", "fBattery", "fPower", "fSort"].forEach(function (id) {
          document.getElementById(id).addEventListener("change", applyFilters);
        });
        document
          .getElementById("globalSearch")
          .addEventListener("input", applyFilters);

        function parseRange(val) {
          if (!val) return null;
          var parts = val.split("-");
          return [parseFloat(parts[0]), parseFloat(parts[1])];
        }

        function applyFilters() {
          var priceRange = parseRange(document.getElementById("fPrice").value);
          var batteryRange = parseRange(
            document.getElementById("fBattery").value,
          );
          var powerRange = parseRange(document.getElementById("fPower").value);
          var sort = document.getElementById("fSort").value;
          var q = document
            .getElementById("globalSearch")
            .value.trim()
            .toLowerCase();

          var filtered = models.filter(function (m) {
            if (
              activeManufacturerId &&
              String(m.manufacturer_id) !== String(activeManufacturerId)
            )
              return false;
            if (
              priceRange &&
              !(
                Number(m.price) >= priceRange[0] &&
                Number(m.price) <= priceRange[1]
              )
            )
              return false;
            if (
              batteryRange &&
              !(
                Number(m.battery_capacity) >= batteryRange[0] &&
                Number(m.battery_capacity) <= batteryRange[1]
              )
            )
              return false;
            if (
              powerRange &&
              !(
                Number(m.e_power) >= powerRange[0] &&
                Number(m.e_power) <= powerRange[1]
              )
            )
              return false;
            if (q) {
              var brand = (manMap[m.manufacturer_id] || "").toLowerCase();
              var name = (m.model_name || "").toLowerCase();
              if (brand.indexOf(q) === -1 && name.indexOf(q) === -1)
                return false;
            }
            return true;
          });

          filtered.sort(function (a, b) {
            if (sort === "price-asc") return Number(a.price) - Number(b.price);
            if (sort === "price-desc") return Number(b.price) - Number(a.price);
            if (sort === "range-desc")
              return Number(b.cltc_range) - Number(a.cltc_range);
            return Number(b.release_year) - Number(a.release_year); // newest
          });

          renderGrid(filtered);
        }

        function renderGrid(list) {
          var grid = document.getElementById("grid");
          var countEl = document.getElementById("resultCount");
          countEl.textContent =
            list.length + (list.length === 1 ? " model" : " models");

          if (!list.length) {
            grid.innerHTML =
              '<div class="empty-state">No models match those filters.</div>';
            return;
          }

          var maxRange =
            Math.max.apply(
              null,
              models.map(function (m) {
                return Number(m.cltc_range) || 0;
              }),
            ) || 1;

          var gridHtml = "";

          list.forEach(function (m) {
            var pct = Math.max(
              4,
              Math.round(((Number(m.cltc_range) || 0) / maxRange) * 100),
            );
            var price = Number(m.price);
            var priceText = isNaN(price) ? "—" : "$" + price.toLocaleString();

            // Build the card HTML with image handling
            var cardHtml =
              '<a class="card" href="model.html?id=' +
              encodeURIComponent(m.id) +
              '">';

            // Thumbnail section - ONLY show image OR SVG, not both
            cardHtml += '<div class="card-thumb" id="thumb-' + m.id + '">';

            // Check if img_url exists and is not null/empty
            if (
              m.img_url &&
              m.img_url.trim() !== "" &&
              m.img_url !== "NULL" &&
              m.img_url !== "null"
            ) {
              // Add image (only the image, no SVG)
              var imgSrc = escapeHtml(m.img_url);
              cardHtml +=
                '<img src="' +
                imgSrc +
                '" alt="' +
                escapeHtml(m.model_name) +
                '" loading="lazy" onerror="this.outerHTML = \'' +
                CAR_SVG.replace(/'/g, "\\'").replace(/"/g, "&quot;") +
                "';\">";
            } else {
              // No image, only show SVG
              cardHtml += CAR_SVG;
            }

            cardHtml += "</div>";

            // Card body
            cardHtml +=
              '<div class="card-body">' +
              '<div class="card-eyebrow">' +
              escapeHtml(manMap[m.manufacturer_id] || "Unknown brand") +
              "</div>" +
              '<div class="card-title">' +
              escapeHtml(m.model_name) +
              "</div>" +
              '<div class="gauge">' +
              '<div class="gauge-labels"><span>Range</span><span>' +
              escapeHtml(m.cltc_range) +
              " km</span></div>" +
              '<div class="gauge-track"><div class="gauge-fill" style="width:' +
              pct +
              '%"></div></div>' +
              "</div>" +
              '<div class="card-foot">' +
              '<span class="card-price">' +
              priceText +
              "</span>" +
              '<span class="card-year">' +
              escapeHtml(m.release_year) +
              "</span>" +
              "</div>" +
              "</div>" +
              "</a>";

            gridHtml += cardHtml;
          });

          grid.innerHTML = gridHtml;
        }

        loadAll();
      })();
    </script>
  </body>
