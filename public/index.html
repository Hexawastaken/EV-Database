<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #faf1ea; /* warm cream/peach background */
        --surface: #ffffff;
        --line: #e5dbd4; /* softer warm gray for borders */
        --text: #16181c;
        --muted: #767a7f;
        --accent: #f57400; /* primary orange */
        --accent-soft: #fef3e6; /* light orange (used for navbar) */
        --gauge-track: #eceef4;
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ---- NAVBAR (updated to match orange palette) ---- */
      nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 14px 32px;
        background: var(--accent-soft); /* light orange */
        border-bottom: 2px solid var(--accent); /* solid orange line */
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .nav-left {
        grid-column: 1;
        justify-self: start;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-brand {
        grid-column: 2;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-self: center;
      }
      .logo-slot {
        width: 43px;
        height: 43px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-slot img {
        width: 200%;
        height: 200%;
        object-fit: contain;
      }
      .logo-fallback {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--text);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.02em;
      }
      .nav-brand h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: 18px;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .nav-right {
        grid-column: 3;
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
      }
      .login-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 9px 18px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .login-btn:hover {
        background: #d96a00;
      }

      .nav-btn-outline {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
        padding: 9px 18px;
        border-radius: 7px;
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .nav-btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }

      /* ---- SEARCH STRIP (updated background) ---- */
      .search-strip {
        background: var(--bg); /* matches the warm page background */
        border-bottom: 1px solid var(--line);
        padding: 16px 32px;
      }
      .search-box {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px 16px;
      }
      .search-box svg {
        flex-shrink: 0;
        opacity: 0.5;
      }
      .search-box input {
        border: none;
        outline: none;
        font-family: var(--body);
        font-size: 14px;
        width: 100%;
        background: none;
        color: var(--text);
      }

      /* ---- LAYOUT ---- */
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 32px 60px;
        display: flex;
        gap: 28px;
      }

      /* sidebar */
      .sidebar {
        width: 280px;
        flex-shrink: 0;
      }
      .sidebar-search {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      .sidebar-search svg {
        opacity: 0.45;
        flex-shrink: 0;
      }
      .sidebar-search input {
        border: none;
        outline: none;
        font-size: 13px;
        width: 100%;
        font-family: var(--body);
        background: none;
      }
      .man-list {
        max-height: 700px;
        overflow-y: auto;
        border: 3px solid var(--accent); /* subtle orange border */
        border-radius: 10px;
        background: var(--surface);
      }
      .man-item {
        padding: 10px 14px;
        font-size: 13.5px;
        cursor: pointer;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
      }
      .man-item:last-child {
        border-bottom: none;
      }
      .man-item:hover {
        background: var(--accent-soft);
      }
      .man-item.active {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      .man-item .brand-logo {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border-radius: 4px;
        object-fit: contain;
        background: #f0f0f0;
      }
      .man-item .brand-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .man-item .count {
        font-size: 11px;
        color: var(--muted);
        flex-shrink: 0;
        margin-left: auto;
      }
      .man-item.active .count {
        color: rgba(255, 255, 255, 0.75);
      }

      /* main */
      .main {
        flex: 1;
        min-width: 0;
      }
      .page-title {
        font-family: var(--display);
        font-size: 30px;
        font-weight: 700;
        margin: 4px 0 16px;
        letter-spacing: -0.01em;
      }

      .filter-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 14px;
        margin-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filters select {
        font-family: var(--body);
        font-size: 12.5px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }
      .result-count {
        font-size: 12.5px;
        color: var(--muted);
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .shell {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
      }
      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 12px 16px;
        }
        .shell {
          padding: 16px 16px 40px;
        }
      }

      .card {
        display: block;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        transition:
          box-shadow 0.15s ease,
          transform 0.15s ease,
          border-color 0.15s ease;
        color: inherit;
      }
      .card:hover {
        box-shadow: 0 10px 28px rgba(245, 116, 0, 0.12);
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .card-thumb {
        aspect-ratio: 16/10;
        background: linear-gradient(180deg, #f1f2f6, #e9eaf0);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .card-thumb .placeholder-svg {
        width: 58%;
        color: #b7bcc8;
      }
      .card-body {
        padding: 14px 15px 16px;
      }
      .card-eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }
      .card-title {
        font-family: var(--display);
        font-size: 16.5px;
        font-weight: 600;
        margin: 3px 0 10px;
        letter-spacing: -0.01em;
      }

      .gauge {
        margin-bottom: 10px;
      }
      .gauge-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .gauge-track {
        height: 5px;
        background: var(--gauge-track);
        border-radius: 3px;
        overflow: hidden;
      }
      .gauge-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
      }

      .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 8px;
      }
      .card-price {
        font-family: var(--display);
        font-weight: 700;
        font-size: 15px;
      }
      .card-year {
        font-size: 11.5px;
        color: var(--muted);
      }

      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
      }

      /* ---- Modal Overlay ---- */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: var(--surface);
        border-radius: 20px;
        padding: 2.5rem 2.8rem;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        animation: modalFade 0.25s ease;
      }
      @keyframes modalFade {
        0% {
          opacity: 0;
          transform: scale(0.96) translateY(12px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-box h2 {
        font-family: var(--display);
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 6px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .modal-box .sub {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 1.5rem;
        border-left: 3px solid var(--accent);
        padding-left: 12px;
      }
      .modal-box .input-group {
        margin-bottom: 1rem;
      }
      .modal-box .input-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .modal-box .input-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        background: var(--bg);
        transition: border-color 0.15s;
      }
      .modal-box .input-group input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(245, 116, 0, 0.2);
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 1.2rem;
        flex-wrap: wrap;
      }
      .modal-actions .btn {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.15s;
        font-size: 14px;
      }
      .modal-actions .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .modal-actions .btn-primary:hover {
        background: #d96a00;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(245, 116, 0, 0.3);
      }
      .modal-actions .btn-secondary {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .modal-actions .btn-secondary:hover {
        background: var(--line);
      }
      .modal-message {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .modal-message.error {
        display: block;
        background: #fde8ea;
        color: #b13e4b;
        border: 1px solid #f5c8cc;
      }
      .modal-message.success {
        display: block;
        background: #e6f4ef;
        color: #1a6e5c;
        border: 1px solid #b8dfd2;
      }
    </style>
  </head>
  <body>
    <nav>
      <!-- LEFT COLUMN – admin link container -->
      <div class="nav-left" id="navLeft"></div>

      <div class="nav-brand">
        <a href="index.html" class="logo-slot">
          <img
            src="./Pictures/Saipa-logo.png"
            alt="Saipa"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <div class="logo-fallback" style="display: none">SAIPA</div>
        </a>
        <h1>EV Database</h1>
      </div>

      <div class="nav-right">
        <a href="search.html" class="nav-btn-outline">🔍 Search</a>
        <a href="advance-search.html" class="nav-btn-outline"
          >★ Advanced Search</a
        >
        <button class="login-btn" id="loginBtn">Log in</button>
        <button
          class="login-btn"
          id="logoutBtn"
          style="display: none; background: #b13e4b"
        >
          Log out
        </button>
      </div>
    </nav>

    <div class="search-strip">
      <div class="search-box">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          id="globalSearch"
          type="text"
          placeholder="Search brand or model"
        />
      </div>
    </div>

    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-search">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="brandFilter" type="text" placeholder="Type brand..." />
        </div>
        <div class="man-list" id="manList">
          <div class="man-item active" data-id="">Loading brands...</div>
        </div>
      </aside>

      <main class="main">
        <h2 class="page-title">All models</h2>

        <div class="filter-bar">
          <div class="filters">
            <!-- Only Sort dropdown remains -->
            <select id="fSort">
              <option value="newest">Sort: Newest</option>
              <option value="price-asc">Price: Low to high</option>
              <option value="price-desc">Price: High to low</option>
              <option value="range-desc">Longest range</option>
            </select>
          </div>
          <div class="result-count" id="resultCount"></div>
        </div>

        <div class="grid" id="grid">
          <div class="empty-state">Loading models…</div>
        </div>
      </main>
    </div>

    <!-- login modal -->
    <div class="modal-overlay" id="loginModal">
      <div class="modal-box">
        <h2>🔐 Log in</h2>
        <div class="sub">Enter your credentials</div>
        <div class="input-group">
          <label for="modalUsername">Username</label>
          <input type="text" id="modalUsername" placeholder="admin" />
        </div>
        <div class="input-group">
          <label for="modalPassword">Password</label>
          <input type="password" id="modalPassword" placeholder="••••••••" />
        </div>
        <div id="modalMessage" class="modal-message"></div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="modalLoginBtn">Log in</button>
          <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var API_BASE = "../api/";
        var manufacturers = [];
        var manMap = {};
        var models = [];
        var activeManufacturerId = "";

        // ---- DOM refs for login modal ----
        var loginModal = document.getElementById("loginModal");
        var modalUsername = document.getElementById("modalUsername");
        var modalPassword = document.getElementById("modalPassword");
        var modalLoginBtn = document.getElementById("modalLoginBtn");
        var modalCancelBtn = document.getElementById("modalCancelBtn");
        var modalMessage = document.getElementById("modalMessage");
        var loginBtn = document.getElementById("loginBtn");
        var logoutBtn = document.getElementById("logoutBtn");
        var navLeft = document.getElementById("navLeft");

        // ---- Login / Logout functions ----
        function showLoginModal() {
          modalUsername.value = "";
          modalPassword.value = "";
          modalMessage.className = "modal-message";
          modalMessage.textContent = "";
          loginModal.classList.add("active");
          modalUsername.focus();
        }

        function hideLoginModal() {
          loginModal.classList.remove("active");
        }
        var username;
        var password;
        function attemptLogin() {
          username = modalUsername.value.trim();
          password = modalPassword.value.trim();
          if (!username || !password) {
            modalMessage.className = "modal-message error";
            modalMessage.textContent = "Please fill in both fields.";
            return;
          }

          fetch(API_BASE + "login.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password }),
            credentials: "include",
          })
            .then((r) => r.json())
            .then((data) => {
              if (data.status) {
                modalMessage.className = "modal-message success";
                modalMessage.textContent = "✅ Login successful!";
                setTimeout(function () {
                  hideLoginModal();
                  updateUI();
                }, 800);
              } else {
                modalMessage.className = "modal-message error";
                modalMessage.textContent = "❌ " + data.message;
              }
            })
            .catch(function (err) {
              modalMessage.className = "modal-message error";
              modalMessage.textContent = "⚠️ Server error. Please try again.";
              console.error(err);
            });
        }

        function logout() {
          fetch(API_BASE + "logout.php", { credentials: "include" })
            .then((r) => r.json())
            .then(function () {
              updateUI();
            });
        }

        function updateUI() {
          fetch(API_BASE + "check-session.php", { credentials: "include" })
            .then((r) => r.json())
            .then((data) => {
              if (data.loggedIn) {
                loginBtn.style.display = "none";
                logoutBtn.style.display = "inline-block";
                // Show admin link
                navLeft.innerHTML =
                  '<a href="admin.html" class="nav-btn-outline">⚙️ Admin Dashboard</a>';
              } else {
                loginBtn.style.display = "inline-block";
                logoutBtn.style.display = "none";
                navLeft.innerHTML = ""; // hide admin link
              }
            })
            .catch(function () {
              // If session check fails, assume not logged in
              loginBtn.style.display = "inline-block";
              logoutBtn.style.display = "none";
              navLeft.innerHTML = "";
            });
        }

        // ---- Event listeners ----
        loginBtn.addEventListener("click", showLoginModal);
        logoutBtn.addEventListener("click", logout);
        modalCancelBtn.addEventListener("click", hideLoginModal);
        modalLoginBtn.addEventListener("click", attemptLogin);

        // Close modal on backdrop click
        loginModal.addEventListener("click", function (e) {
          if (e.target === loginModal) hideLoginModal();
        });

        // Enter key in modal
        modalUsername.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            modalPassword.focus();
          }
        });
        modalPassword.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            attemptLogin();
          }
        });
        // ---- vehicle placeholder SVG ----
        var CAR_SVG =
          '<svg class="placeholder-svg" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M6 26 L10 15 Q12 11 18 11 H40 Q46 11 49 15 L54 24" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>' +
          '<path d="M4 26 H58 Q60 26 60 28 V30 Q60 32 58 32 H4 Q2 32 2 30 V28 Q2 26 4 26 Z" fill="currentColor" opacity="0.15"/>' +
          '<path d="M4 26 H58" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' +
          '<circle cx="16" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<circle cx="46" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="2.2"/>' +
          '<path d="M20 12 V20 M34 12 V20" stroke="currentColor" stroke-width="1.6" opacity="0.5"/>' +
          "</svg>";

        // ---- placeholder logo (temporary) ----
        var LOGO_PLACEHOLDER =
          'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"%3E%3Crect width="40" height="40" fill="%23eee"/%3E%3Ctext x="20" y="26" font-size="20" text-anchor="middle" fill="%23999"%3E🚗%3C/text%3E%3C/svg%3E';

        function escapeHtml(str) {
          if (str === null || str === undefined) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        // ---- render sidebar (with fallback) ----
        function renderSidebar() {
          var manList = document.getElementById("manList");

          try {
            var counts = {};
            models.forEach(function (m) {
              counts[m.manufacturer_id] = (counts[m.manufacturer_id] || 0) + 1;
            });

            var html =
              '<div class="man-item' +
              (activeManufacturerId === "" ? " active" : "") +
              '" data-id="">' +
              '<span class="brand-name">All Brands</span>' +
              '<span class="count">' +
              models.length +
              "</span></div>";

            if (manufacturers && manufacturers.length > 0) {
              manufacturers.forEach(function (m) {
                var isActive = String(activeManufacturerId) === String(m.id);
                var logoUrl = m.logo_url || LOGO_PLACEHOLDER;
                html +=
                  '<div class="man-item' +
                  (isActive ? " active" : "") +
                  '" data-id="' +
                  m.id +
                  '">' +
                  '<img class="brand-logo" src="' +
                  logoUrl +
                  '" alt="' +
                  escapeHtml(m.name) +
                  ' logo" onerror="this.src=\'' +
                  LOGO_PLACEHOLDER +
                  "'\" />" +
                  '<span class="brand-name">' +
                  escapeHtml(m.name) +
                  "</span>" +
                  '<span class="count">' +
                  (counts[m.id] || 0) +
                  "</span>" +
                  "</div>";
              });
            } else {
              // Fallback if no manufacturers
              html +=
                '<div class="man-item" style="color:var(--muted);cursor:default;">No brands found</div>';
            }

            manList.innerHTML = html;

            // Add click events
            manList
              .querySelectorAll(".man-item[data-id]")
              .forEach(function (item) {
                item.addEventListener("click", function () {
                  activeManufacturerId = item.dataset.id;
                  renderSidebar();
                  applyFilters();
                });
              });
          } catch (error) {
            console.error("Error rendering sidebar:", error);
            manList.innerHTML =
              '<div class="man-item" style="color:var(--error);cursor:default;">Error loading brands</div>';
          }
        }

        // ---- load data ----
        function loadAll() {
          document.getElementById("grid").innerHTML =
            '<div class="empty-state">Loading models…</div>';

          Promise.all([
            fetch(API_BASE + "read-all-man.php")
              .then(function (r) {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
              })
              .catch(function (err) {
                console.error("Manufacturers API error:", err);
                return { data: [] };
              }),
            fetch(API_BASE + "read-all-model.php")
              .then(function (r) {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
              })
              .catch(function (err) {
                console.error("Models API error:", err);
                return { data: [] };
              }),
          ])
            .then(function (results) {
              // Safely extract data
              manufacturers = (results[0] && results[0].data) || [];
              models = (results[1] && results[1].data) || [];

              // Build manufacturer map
              manMap = {};
              manufacturers.forEach(function (m) {
                if (m && m.id) {
                  manMap[m.id] = m.name || "Unknown";
                }
              });

              // Render sidebar and grid
              renderSidebar();
              applyFilters();

              // Log for debugging
              console.log("Loaded " + manufacturers.length + " manufacturers");
              console.log("Loaded " + models.length + " models");
            })
            .catch(function (error) {
              console.error("Error loading data:", error);
              document.getElementById("grid").innerHTML =
                '<div class="empty-state">Could not reach the API. Check that your API is running.</div>';
              // Still render sidebar with whatever data we have
              renderSidebar();
            });
        }

        // ---- brand filter ----
        document
          .getElementById("brandFilter")
          .addEventListener("input", function (e) {
            var q = e.target.value.toLowerCase();
            document
              .querySelectorAll(".man-item[data-id]")
              .forEach(function (item) {
                if (item.dataset.id === "") return;
                var name = item.textContent.toLowerCase();
                item.style.display = name.indexOf(q) === -1 ? "none" : "flex";
              });
          });

        // ---- filters ----
        // Only the Sort dropdown and global search need listeners
        document
          .getElementById("fSort")
          .addEventListener("change", applyFilters);
        document
          .getElementById("globalSearch")
          .addEventListener("input", applyFilters);

        function applyFilters() {
          var sort = document.getElementById("fSort").value;
          var q = document
            .getElementById("globalSearch")
            .value.trim()
            .toLowerCase();

          var filtered = models.filter(function (m) {
            // Manufacturer filter (from sidebar)
            if (
              activeManufacturerId &&
              String(m.manufacturer_id) !== String(activeManufacturerId)
            )
              return false;

            // Global search (brand or model name)
            if (q) {
              var brand = (manMap[m.manufacturer_id] || "").toLowerCase();
              var name = (m.model_name || "").toLowerCase();
              if (brand.indexOf(q) === -1 && name.indexOf(q) === -1)
                return false;
            }

            return true;
          });

          // Sort the filtered results
          filtered.sort(function (a, b) {
            if (sort === "price-asc") return Number(a.price) - Number(b.price);
            if (sort === "price-desc") return Number(b.price) - Number(a.price);
            if (sort === "range-desc")
              return Number(b.cltc_range) - Number(a.cltc_range);
            // default: newest
            return Number(b.release_year) - Number(a.release_year);
          });

          renderGrid(filtered);
        }

        function renderGrid(list) {
          var grid = document.getElementById("grid");
          var countEl = document.getElementById("resultCount");
          countEl.textContent =
            list.length + (list.length === 1 ? " model" : " models");

          if (!list.length) {
            grid.innerHTML =
              '<div class="empty-state">No models match those filters.</div>';
            return;
          }

          var maxRange =
            Math.max.apply(
              null,
              models.map(function (m) {
                return Number(m.cltc_range) || 0;
              }),
            ) || 1;

          var gridHtml = "";

          list.forEach(function (m) {
            var pct = Math.max(
              4,
              Math.round(((Number(m.cltc_range) || 0) / maxRange) * 100),
            );
            var price = Number(m.price);
            var priceText = isNaN(price) ? "—" : "$" + price.toLocaleString();

            var cardHtml =
              '<a class="card" href="model.html?id=' +
              encodeURIComponent(m.id) +
              '">';

            cardHtml += '<div class="card-thumb" id="thumb-' + m.id + '">';

            if (
              m.img_url &&
              m.img_url.trim() !== "" &&
              m.img_url !== "NULL" &&
              m.img_url !== "null"
            ) {
              var imgSrc = escapeHtml(m.img_url);
              cardHtml +=
                '<img src="' +
                imgSrc +
                '" alt="' +
                escapeHtml(m.model_name) +
                '" loading="lazy" onerror="this.outerHTML = \'' +
                CAR_SVG.replace(/'/g, "\\'").replace(/"/g, "&quot;") +
                "';\">";
            } else {
              cardHtml += CAR_SVG;
            }

            cardHtml += "</div>";

            cardHtml +=
              '<div class="card-body">' +
              '<div class="card-eyebrow">' +
              escapeHtml(manMap[m.manufacturer_id] || "Unknown brand") +
              "</div>" +
              '<div class="card-title">' +
              escapeHtml(m.model_name) +
              "</div>" +
              '<div class="gauge">' +
              '<div class="gauge-labels"><span>Range</span><span>' +
              escapeHtml(m.cltc_range) +
              " km</span></div>" +
              '<div class="gauge-track"><div class="gauge-fill" style="width:' +
              pct +
              '%"></div></div>' +
              "</div>" +
              '<div class="card-foot">' +
              '<span class="card-price">' +
              priceText +
              "</span>" +
              '<span class="card-year">' +
              escapeHtml(m.release_year) +
              "</span>" +
              "</div>" +
              "</div>" +
              "</a>";

            gridHtml += cardHtml;
          });

          grid.innerHTML = gridHtml;
        }

        // ---- Start ----
        loadAll();
        updateUI();
      })();
    </script>
  </body>
</html>
